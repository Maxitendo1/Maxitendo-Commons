<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#4CAF50"/>
  
  <!-- Main Commons symbol - interconnected blocks representing shared components -->
  <g transform="translate(100, 100)">
    
    <!-- Central hub block -->
    <rect x="-15" y="-15" width="30" height="30" fill="#FFFFFF" rx="3"/>
    
    <!-- Top block -->
    <rect x="-12" y="-45" width="24" height="20" fill="#E8F5E8" rx="2"/>
    
    <!-- Bottom block -->
    <rect x="-12" y="25" width="24" height="20" fill="#E8F5E8" rx="2"/>
    
    <!-- Left block -->
    <rect x="-45" y="-12" width="20" height="24" fill="#E8F5E8" rx="2"/>
    
    <!-- Right block -->
    <rect x="25" y="-12" width="20" height="24" fill="#E8F5E8" rx="2"/>
    
    <!-- Connection lines -->
    <line x1="0" y1="-15" x2="0" y2="-25" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="0" y1="15" x2="0" y2="25" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="-15" y1="0" x2="-25" y2="0" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="15" y1="0" x2="25" y2="0" stroke="#FFFFFF" stroke-width="3"/>
    
    <!-- Small dots representing additional components -->
    <circle cx="-35" cy="-35" r="4" fill="#FFFFFF"/>
    <circle cx="35" cy="-35" r="4" fill="#FFFFFF"/>
    <circle cx="-35" cy="35" r="4" fill="#FFFFFF"/>
    <circle cx="35" cy="35" r="4" fill="#FFFFFF"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#4CAF50"/>
    
  </g>
  
</svg>
